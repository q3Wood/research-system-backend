spring:
  mvc:
    favicon:
      enabled: false
  output:
    ansi:
      enabled: ALWAYS
  application:
    name: backend-template
# 上传测试
  # 1. 数据源配置 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库 url，指向 backend 数据库
    url: jdbc:mysql://localhost:3306/research_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456 # 请修改为你的 MySQL 密码

  # 2. JSON 处理配置 (Jackson)
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  # 3. Swagger 文档配置 (Knife4j)
  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true
    # 扫描包路径
    packages-to-scan: com.acha.project.controller

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启 SQL 日志打印
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false

acha:
  security:
    jwt-key: acha-backend-template-secret-key # 修改为你自己的密钥
    token-ttl-hours: 24
    salt: "acha_complex_salt_2026!@#"
    #jwt-key: "my_super_secret_jwt_key_for_acha_project"

# 4. 日志配置 (Logback)
logging:
  level:
    root: INFO # 全局日志级别
    com.acha.project: DEBUG # 开启我们自己代码的 DEBUG 日志，方便调试
    org.springframework: WARN # 减少 Spring 框架的啰嗦日志
    org.mybatis: WARN # 减少 MyBatis 的日志（如果不调试 SQL）
  file:
    name: logs/backend.log # 日志文件输出路径 (自动生成在项目根目录 logs 文件夹下)
  logback:
    rollingpolicy:
      max-file-size: 10MB # 单个日志文件最大大小
      max-history: 30 # 保留最近 30 天的日志
      file-name-pattern: ${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz # 归档文件命名格式
  charset:
    console: GBK
    file: UTF-8


